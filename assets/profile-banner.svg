<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">yudaleng profile banner</title>
  <desc id="desc">A dark technical dashboard style banner for yudaleng, focused on clinical data and research systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.45" stop-color="#101827"/>
      <stop offset="1" stop-color="#191328"/>
    </linearGradient>
    <linearGradient id="accent" x1="105" y1="92" x2="640" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="line" x1="730" y1="93" x2="1085" y2="267" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.48" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
    <filter id="soft" x="-40" y="-40" width="1280" height="440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#263244" stroke-width="1" opacity="0.48"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="8" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="8" fill="url(#grid)" opacity="0.7"/>
  <path d="M70 292H1130" stroke="url(#accent)" stroke-width="2"/>

  <g filter="url(#soft)">
    <rect x="70" y="54" width="1060" height="252" rx="8" fill="#0B1220" fill-opacity="0.78" stroke="#263244"/>
  </g>

  <text x="105" y="112" fill="url(#accent)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="68" font-weight="800" letter-spacing="0">yudaleng</text>
  <text x="109" y="154" fill="#CBD5E1" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="21" letter-spacing="0">clinical data / research systems</text>
  <text x="109" y="206" fill="#E5E7EB" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="18" letter-spacing="0">build: precise pipelines for difficult questions</text>
  <text x="109" y="240" fill="#94A3B8" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="16" letter-spacing="0">Python  R  Deep Learning  Signal Analysis</text>

  <g transform="translate(725 78)">
    <rect x="0" y="0" width="380" height="202" rx="8" fill="#111827" stroke="#334155"/>
    <path d="M32 152 C68 104, 98 110, 124 132 S181 177, 215 122 S278 52, 340 72" stroke="url(#line)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M32 152 C68 104, 98 110, 124 132 S181 177, 215 122 S278 52, 340 72" stroke="#E0F2FE" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.55"/>
    <g fill="#CBD5E1">
      <rect x="32" y="42" width="74" height="8" rx="4" opacity="0.75"/>
      <rect x="32" y="62" width="122" height="8" rx="4" opacity="0.45"/>
      <rect x="244" y="154" width="92" height="8" rx="4" opacity="0.65"/>
      <rect x="244" y="174" width="58" height="8" rx="4" opacity="0.4"/>
    </g>
    <g stroke="#334155" stroke-width="1">
      <path d="M30 184H350"/>
      <path d="M30 24V184"/>
      <path d="M110 24V184" opacity="0.45"/>
      <path d="M190 24V184" opacity="0.45"/>
      <path d="M270 24V184" opacity="0.45"/>
      <path d="M30 104H350" opacity="0.45"/>
    </g>
    <text x="32" y="26" fill="#38BDF8" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13">signal</text>
    <text x="264" y="146" fill="#22C55E" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13">validated</text>
  </g>
</svg>
